<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AetherPlay — игровая платформа</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar glass-panel">
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 64 64" aria-hidden="true">
            <defs>
              <linearGradient id="brandGlow" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#7de1ff" />
                <stop offset="100%" stop-color="#6b7dff" />
              </linearGradient>
            </defs>
            <path d="M32 6L56 20V44L32 58L8 44V20Z" fill="url(#brandGlow)" />
            <path d="M32 18L44 24V38L32 45L20 38V24Z" fill="#0b1234" />
          </svg>
          <span>AetherPlay</span>
        </div>

        <nav class="top-nav">
          <button class="nav-link" data-route="home">Главная</button>
          <button class="nav-link" data-route="library">Игры</button>
          <button class="nav-link" data-route="leaderboard">Лидеры</button>
          <button class="nav-link" data-route="account">Аккаунт</button>
        </nav>

        <div id="sessionActions" class="session-actions"></div>
      </header>

      <main id="viewRoot" class="view-root"></main>
    </div>

    <template id="homeViewTemplate">
      <section class="hero-card glass-panel">
        <div class="hero-badge">
          <svg class="pulse-icon" viewBox="0 0 32 32" aria-hidden="true">
            <circle cx="16" cy="16" r="6"></circle>
          </svg>
          <span>Live platform</span>
        </div>

        <h1>Игровая платформа с регистрацией, анимацией и мгновенным запуском игр</h1>

        <p>
          Соберите коллекцию достижений, соревнуйтесь в таблице лидеров и
          играйте в динамичные мини-игры прямо в браузере.
        </p>

        <button class="primary-button" data-route="library">Открыть библиотеку</button>
      </section>

      <section class="metrics-grid">
        <article class="metric glass-panel">
          <h3 id="gamesCount">0</h3>
          <p>игр в библиотеке</p>
        </article>

        <article class="metric glass-panel">
          <h3 id="playersCount">0</h3>
          <p>игроков в системе</p>
        </article>

        <article class="metric glass-panel">
          <h3 id="highScoreValue">0</h3>
          <p>лучший счёт</p>
        </article>
      </section>
    </template>

    <template id="libraryViewTemplate">
      <section>
        <h2>Библиотека игр</h2>
        <p class="subtle">Выберите игру и поставьте новый рекорд.</p>
        <div id="gameGrid" class="game-grid"></div>
      </section>

      <section id="gameArena" class="game-arena glass-panel"></section>
    </template>

    <template id="leaderboardViewTemplate">
      <section>
        <h2>Таблица лидеров</h2>
        <p class="subtle">Список лучших игроков платформы.</p>
        <div id="leaderboardTable"></div>
      </section>
    </template>

    <template id="accountViewTemplate">
      <section class="account-card glass-panel">
        <h2 id="accountTitle">Вход и регистрация</h2>

        <form id="authForm" class="auth-form">
          <input id="emailField" type="email" placeholder="Email" required />
          <input id="passwordField" type="password" placeholder="Пароль" required />
          <button class="primary-button" type="submit">Продолжить</button>
        </form>

        <p class="subtle">Новый email создаёт аккаунт автоматически.</p>
      </section>
    </template>

    <script src="app.js"></script>
  </body>
</html>
